    <rect x="52" y="8" width="8" height="14" rx="3" fill="#7c5cd6"/>
    <rect x="0" y="0" width="56" height="30" rx="9" fill="#a78bfa"/>
    <rect x="22" y="21" width="12" height="9" rx="4" fill="#161a36"/>
    <circle cx="15" cy="14" r="8" fill="#2c2250"/>
    <circle cx="41" cy="14" r="8" fill="#2c2250"/>
    <circle cx="15" cy="14" r="3.5" fill="#7ee7f5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
