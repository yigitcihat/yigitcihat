  <text x="110" y="66" font-family="Consolas, 'Courier New', monospace" font-size="19" font-weight="bold" fill="#e8ebff">VR GlassPulling</text>
  <text x="372" y="33" font-family="Consolas, monospace" font-size="14" fill="#a78bfa" text-anchor="middle">&#9658;<animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></text>
  <text x="110" y="89"  font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">VR mini-games: glass pulling, ring pass</text>
  <text x="110" y="106" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">and avatar head &amp; body skin switching.</text>

