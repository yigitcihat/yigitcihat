<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b3f66"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="398" height="158" rx="12" fill="#0d1020" stroke="url(#border)" stroke-width="1.5"/>
  <ellipse cx="200" cy="2" rx="190" ry="42" fill="#22d3ee" opacity="0.06"/>

  <!-- icon box: wobbling pixel egg -->
  <rect x="20" y="44" width="72" height="72" rx="12" fill="#161a36"/>
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-5 56 102; 5 56 102; -5 56 102" dur="1.6s" repeatCount="indefinite"/>
    <g fill="#f8fafc">
      <rect x="50" y="62" width="12" height="5"/>
      <rect x="45" y="67" width="22" height="5"/>
      <rect x="42" y="72" width="28" height="10"/>
      <rect x="40" y="82" width="32" height="10"/>
      <rect x="42" y="92" width="28" height="5"/>
      <rect x="46" y="97" width="20" height="5"/>
    </g>
    <!-- crack -->
    <g fill="#0d1020">
      <rect x="48" y="80" width="4" height="3"/>
      <rect x="52" y="77" width="4" height="3"/>
      <rect x="56" y="80" width="4" height="3"/>
      <rect x="60" y="77" width="4" height="3"/>
    </g>
    <!-- eyes -->
    <rect x="49" y="86" width="4" height="5" fill="#0d1020"/>
    <rect x="59" y="86" width="4" height="5" fill="#0d1020"/>
  </g>

  <text x="110" y="66" font-family="Consolas, 'Courier New', monospace" font-size="19" font-weight="bold" fill="#e8ebff">Eggventure</text>
  <text x="372" y="33" font-family="Consolas, monospace" font-size="14" fill="#22d3ee" text-anchor="middle">&#9658;<animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></text>
  <text x="110" y="89"  font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">Competitive obstacle-course battle royale —</text>
  <text x="110" y="106" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">eggs crack, take damage and fall behind.</text>

  <g font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" text-anchor="middle">
    <rect x="110" y="118" width="50" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="110" y="118" width="50" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="135" y="133" fill="#a5f3fc">Unity</text>
    <rect x="168" y="118" width="34" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="168" y="118" width="34" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="185" y="133" fill="#a5f3fc">PC</text>
    <rect x="210" y="118" width="84" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="210" y="118" width="84" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="252" y="133" fill="#a5f3fc">Multiplayer</text>
    <rect x="302" y="118" width="54" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="302" y="118" width="54" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="329" y="133" fill="#a5f3fc">Co-op</text>
  </g>
</svg>
