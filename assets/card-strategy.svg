<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#3b3f66"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="398" height="158" rx="12" fill="#0d1020" stroke="url(#border)" stroke-width="1.5"/>
  <ellipse cx="200" cy="2" rx="190" ry="42" fill="#facc15" opacity="0.06"/>

  <!-- icon box: pixel tank -->
  <rect x="20" y="44" width="72" height="72" rx="12" fill="#161a36"/>
  <g transform="translate(30,66)">
    <!-- turret & barrel -->
    <rect x="12" y="6" width="18" height="11" fill="#facc15"/>
    <rect x="28" y="9" width="22" height="5" fill="#eab308"/>
    <!-- muzzle flash -->
    <g fill="#fff7cc">
      <rect x="50" y="7" width="5" height="9"/>
      <rect x="55" y="9" width="3" height="5"/>
      <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.82;0.87;0.93;1" dur="2.6s" repeatCount="indefinite"/>
    </g>
    <!-- hull -->
    <rect x="2" y="17" width="42" height="10" fill="#eab308"/>
    <!-- tracks -->
    <rect x="0" y="27" width="46" height="10" rx="5" fill="#a16207"/>
    <g fill="#161a36">
      <rect x="7"  y="30" width="4" height="4"/>
      <rect x="16" y="30" width="4" height="4"/>
      <rect x="25" y="30" width="4" height="4"/>
      <rect x="34" y="30" width="4" height="4"/>
    </g>
  </g>

  <text x="110" y="66" font-family="Consolas, 'Courier New', monospace" font-size="19" font-weight="bold" fill="#e8ebff">2D Strategy Game</text>
  <text x="372" y="33" font-family="Consolas, monospace" font-size="14" fill="#facc15" text-anchor="middle">&#9658;<animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></text>
  <text x="110" y="89"  font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">Base building, unit production and combat</text>
  <text x="110" y="106" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">in an RTS demo — barracks, tanks &amp; helis.</text>

  <g font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" text-anchor="middle">
    <rect x="110" y="118" width="50" height="22" rx="11" fill="#facc15" opacity="0.12"/>
    <rect x="110" y="118" width="50" height="22" rx="11" fill="none" stroke="#facc15" opacity="0.45"/>
    <text x="135" y="133" fill="#fde68a">Unity</text>
    <rect x="168" y="118" width="36" height="22" rx="11" fill="#facc15" opacity="0.12"/>
    <rect x="168" y="118" width="36" height="22" rx="11" fill="none" stroke="#facc15" opacity="0.45"/>
    <text x="186" y="133" fill="#fde68a">C#</text>
    <rect x="212" y="118" width="44" height="22" rx="11" fill="#facc15" opacity="0.12"/>
    <rect x="212" y="118" width="44" height="22" rx="11" fill="none" stroke="#facc15" opacity="0.45"/>
    <text x="234" y="133" fill="#fde68a">RTS</text>
  </g>
</svg>
