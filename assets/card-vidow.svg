<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b3f66"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="398" height="158" rx="12" fill="#0d1020" stroke="url(#border)" stroke-width="1.5"/>
  <ellipse cx="200" cy="2" rx="190" ry="42" fill="#22d3ee" opacity="0.06"/>

  <!-- icon box: app window with play + download bar -->
  <rect x="20" y="44" width="72" height="72" rx="12" fill="#161a36"/>
  <g transform="translate(28,56)">
    <rect x="0" y="0" width="56" height="48" rx="6" fill="#0d1020" stroke="#22d3ee" stroke-width="1.5"/>
    <rect x="0" y="0" width="56" height="11" rx="6" fill="#22d3ee" opacity="0.25"/>
    <circle cx="8"  cy="5.5" r="2" fill="#22d3ee"/>
    <circle cx="15" cy="5.5" r="2" fill="#22d3ee" opacity="0.5"/>
    <polygon points="23,18 23,34 37,26" fill="#22d3ee"/>
    <rect x="10" y="39" width="36" height="4" rx="2" fill="#1e2447"/>
    <rect x="10" y="39" width="36" height="4" rx="2" fill="#22d3ee">
      <animate attributeName="width" values="0;36;36" keyTimes="0;0.8;1" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="110" y="66" font-family="Consolas, 'Courier New', monospace" font-size="19" font-weight="bold" fill="#e8ebff">Vidow</text>
  <text x="372" y="33" font-family="Consolas, monospace" font-size="14" fill="#22d3ee" text-anchor="middle">&#9658;<animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></text>
  <text x="110" y="89"  font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">A video downloader app built inside Unity —</text>
  <text x="110" y="106" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">networking, custom UI &amp; shaders. In progress.</text>

  <g font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" text-anchor="middle">
    <rect x="110" y="118" width="50" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="110" y="118" width="50" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="135" y="133" fill="#a5f3fc">Unity</text>
    <rect x="168" y="118" width="36" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="168" y="118" width="36" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="186" y="133" fill="#a5f3fc">C#</text>
    <rect x="212" y="118" width="52" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="212" y="118" width="52" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="238" y="133" fill="#a5f3fc">HLSL</text>
    <rect x="272" y="118" width="44" height="22" rx="11" fill="#22d3ee" opacity="0.12"/>
    <rect x="272" y="118" width="44" height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.45"/>
    <text x="294" y="133" fill="#a5f3fc">WIP</text>
  </g>
</svg>
