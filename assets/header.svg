<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070b1c"/>
      <stop offset="60%" stop-color="#131034"/>
      <stop offset="100%" stop-color="#1d1145"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame"><rect width="1000" height="300" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1000" height="300" fill="url(#bg)"/>

    <!-- stars -->
    <g fill="#cdd6ff">
      <rect x="60"  y="40"  width="2" height="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></rect>
      <rect x="140" y="90"  width="2" height="2" opacity="0.6"/>
      <rect x="230" y="35"  width="2" height="2"><animate attributeName="opacity" values="1;0.15;1" dur="3.4s" repeatCount="indefinite"/></rect>
      <rect x="320" y="70"  width="2" height="2" opacity="0.5"/>
      <rect x="410" y="30"  width="3" height="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></rect>
      <rect x="505" y="85"  width="2" height="2" opacity="0.7"/>
      <rect x="585" y="45"  width="2" height="2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.9s" repeatCount="indefinite"/></rect>
      <rect x="660" y="25"  width="2" height="2" opacity="0.5"/>
      <rect x="705" y="95"  width="2" height="2"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.8s" repeatCount="indefinite"/></rect>
      <rect x="905" y="40"  width="3" height="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></rect>
      <rect x="955" y="105" width="2" height="2" opacity="0.6"/>
      <rect x="855" y="20"  width="2" height="2"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></rect>
      <rect x="90"  y="130" width="2" height="2" opacity="0.4"/>
      <rect x="370" y="120" width="2" height="2"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.6s" repeatCount="indefinite"/></rect>
      <rect x="770" y="15"  width="2" height="2" opacity="0.5"/>
    </g>

    <!-- retro sun -->
    <g>
      <circle cx="830" cy="185" r="62" fill="url(#sun)" opacity="0.9"/>
      <g fill="#131034">
        <rect x="760" y="176" width="140" height="5"/>
        <rect x="760" y="189" width="140" height="7"/>
        <rect x="760" y="204" width="140" height="9"/>
      </g>
    </g>

    <!-- perspective grid -->
    <g stroke="#7c3aed" stroke-width="1" opacity="0.35">
      <line x1="500" y1="212" x2="-260" y2="300"/>
      <line x1="500" y1="212" x2="-60"  y2="300"/>
      <line x1="500" y1="212" x2="140"  y2="300"/>
      <line x1="500" y1="212" x2="340"  y2="300"/>
      <line x1="500" y1="212" x2="500"  y2="300"/>
      <line x1="500" y1="212" x2="660"  y2="300"/>
      <line x1="500" y1="212" x2="860"  y2="300"/>
      <line x1="500" y1="212" x2="1060" y2="300"/>
      <line x1="500" y1="212" x2="1260" y2="300"/>
      <line x1="0" y1="222" x2="1000" y2="222"/>
      <line x1="0" y1="236" x2="1000" y2="236"/>
      <line x1="0" y1="256" x2="1000" y2="256"/>
      <line x1="0" y1="282" x2="1000" y2="282"/>
    </g>
    <rect x="0" y="210" width="1000" height="3" fill="#22d3ee" filter="url(#glow)" opacity="0.8">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- name & titles -->
    <text x="70" y="128" font-family="Consolas, 'Courier New', monospace" font-size="58" font-weight="bold" letter-spacing="4" fill="url(#title)" filter="url(#glow)">CIHAT YIGIT</text>
    <text x="72" y="170" font-family="Consolas, 'Courier New', monospace" font-size="23" fill="#7ee7f5">&gt; GAME DEVELOPER</text>
    <rect x="304" y="152" width="12" height="21" fill="#7ee7f5">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <text x="72" y="199" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="15" fill="#8b93b8">Unity&#160;&#160;&#183;&#160;&#160;C#&#160;&#160;&#183;&#160;&#160;Shaders&#160;&#160;&#183;&#160;&#160;DOTS&#160;&#160;&#183;&#160;&#160;Istanbul, TR</text>

    <!-- pixel crab walking on the grid -->
    <g transform="translate(672,228)">
      <animateTransform attributeName="transform" type="translate" values="672,228; 672,225; 672,228" dur="1.2s" repeatCount="indefinite" additive="replace"/>
      <!-- eye stalks & eyes -->
      <rect x="15" y="-11" width="4" height="7" fill="#f43f5e"/>
      <rect x="31" y="-11" width="4" height="7" fill="#f43f5e"/>
      <rect x="12" y="-17" width="8" height="8" fill="#ffe4e6"/>
      <rect x="29" y="-17" width="8" height="8" fill="#ffe4e6"/>
      <rect x="15" y="-14" width="3" height="3" fill="#131034"/>
      <rect x="32" y="-14" width="3" height="3" fill="#131034"/>
      <!-- body -->
      <rect x="10" y="-4" width="30" height="7" fill="#fb7185"/>
      <rect x="4"  y="3"  width="42" height="13" fill="#f43f5e"/>
      <!-- claws -->
      <rect x="-10" y="0" width="12" height="10" fill="#fb7185"/>
      <rect x="-10" y="3" width="5"  height="4"  fill="#131034"/>
      <rect x="48"  y="0" width="12" height="10" fill="#fb7185"/>
      <rect x="55"  y="3" width="5"  height="4"  fill="#131034"/>
      <!-- legs: two frames toggling = walk cycle -->
      <g fill="#e11d48">
        <g>
          <rect x="6"  y="16" width="5" height="7"/>
          <rect x="17" y="16" width="5" height="7"/>
          <rect x="28" y="16" width="5" height="7"/>
          <rect x="39" y="16" width="5" height="7"/>
          <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.6s" repeatCount="indefinite"/>
        </g>
        <g>
          <rect x="11" y="16" width="5" height="7"/>
          <rect x="22" y="16" width="5" height="7"/>
          <rect x="33" y="16" width="5" height="7"/>
          <rect x="44" y="16" width="5" height="7"/>
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.5;1" dur="0.6s" repeatCount="indefinite"/>
        </g>
      </g>
    </g>

    <!-- floating particles -->
    <circle cx="150" cy="240" r="2" fill="#22d3ee" opacity="0.7">
      <animate attributeName="cy" values="250;150" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="260" r="2" fill="#a78bfa" opacity="0.7">
      <animate attributeName="cy" values="265;160" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="940" cy="250" r="2" fill="#f472b6" opacity="0.7">
      <animate attributeName="cy" values="255;140" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
