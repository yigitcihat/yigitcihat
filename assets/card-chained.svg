<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#3b3f66"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="398" height="158" rx="12" fill="#0d1020" stroke="url(#border)" stroke-width="1.5"/>
  <ellipse cx="200" cy="2" rx="190" ry="42" fill="#a78bfa" opacity="0.07"/>

  <!-- icon box: pixel skull with glowing eyes + chain -->
  <rect x="20" y="44" width="72" height="72" rx="12" fill="#161a36"/>
  <g>
    <!-- skull -->
    <g fill="#e8ebff">
      <rect x="42" y="58" width="28" height="6"/>
      <rect x="38" y="64" width="36" height="18"/>
      <rect x="42" y="82" width="28" height="5"/>
      <rect x="46" y="87" width="20" height="7"/>
    </g>
    <!-- eye sockets -->
    <rect x="44" y="69" width="8" height="8" fill="#0d1020"/>
    <rect x="60" y="69" width="8" height="8" fill="#0d1020"/>
    <rect x="46" y="71" width="4" height="4" fill="#f472b6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="62" y="71" width="4" height="4" fill="#f472b6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <!-- nose & teeth -->
    <rect x="54" y="76" width="4" height="4" fill="#0d1020"/>
    <rect x="49" y="87" width="3" height="4" fill="#0d1020"/>
    <rect x="55" y="87" width="3" height="4" fill="#0d1020"/>
    <rect x="61" y="87" width="3" height="4" fill="#0d1020"/>
    <!-- chain links -->
    <g fill="none" stroke="#a78bfa" stroke-width="3">
      <rect x="26" y="96" width="12" height="9" rx="4"/>
      <rect x="42" y="99" width="12" height="9" rx="4"/>
      <rect x="58" y="102" width="12" height="9" rx="4"/>
    </g>
  </g>

  <text x="110" y="66" font-family="Consolas, 'Courier New', monospace" font-size="17" font-weight="bold" fill="#e8ebff">Chained for Forgiveness</text>
  <text x="372" y="33" font-family="Consolas, monospace" font-size="14" fill="#a78bfa" text-anchor="middle">&#9658;<animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></text>
  <text x="110" y="89"  font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">Co-op horror survival — players are chained</text>
  <text x="110" y="106" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" fill="#9aa3c7">together on procedurally generated maps.</text>

  <g font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" text-anchor="middle">
    <rect x="110" y="118" width="50" height="22" rx="11" fill="#a78bfa" opacity="0.12"/>
    <rect x="110" y="118" width="50" height="22" rx="11" fill="none" stroke="#a78bfa" opacity="0.45"/>
    <text x="135" y="133" fill="#c4b5fd">Unity</text>
    <rect x="168" y="118" width="84" height="22" rx="11" fill="#a78bfa" opacity="0.12"/>
    <rect x="168" y="118" width="84" height="22" rx="11" fill="none" stroke="#a78bfa" opacity="0.45"/>
    <text x="210" y="133" fill="#c4b5fd">Multiplayer</text>
    <rect x="260" y="118" width="56" height="22" rx="11" fill="#a78bfa" opacity="0.12"/>
    <rect x="260" y="118" width="56" height="22" rx="11" fill="none" stroke="#a78bfa" opacity="0.45"/>
    <text x="288" y="133" fill="#c4b5fd">Horror</text>
  </g>
</svg>
